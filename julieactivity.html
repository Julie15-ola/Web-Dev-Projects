<!DOCTYPE html>
<html>
<head>
    <title>BMI Calculator</title>
    <style>
        body {
            font-family: Arial;
            margin: 110px;
            background-image: url("https://marketplace.canva.com/EAGOXiKLMVA/1/0/1600w/canva-pink-and-white-watercolor-illustration-pattern-desktop-wallpaper-Fu25SPEYnAk.jpg");
        }
        input, button {
            margin: 20px 0;
            padding: 20px;
            border-radius: 20px;
            border: 1px solid #e70c68;
        }
        button {
            background-color: #1fcf25; 
            color: white;
            border: none;
            cursor: pointer;
            transition: background-color 0.3s;
        }
        button:hover {
            background-color: #dd29a1;
        }
        h3 {
            color: #0f0f0f;
        }
        label {
            font-weight: bold;
        }
        div {
            width: 400px;
            margin: auto;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0px 4px 8px rgba(0, 0, 0, 0.1);
            background-color: rgb(236, 122, 231);
        }
    </style>
</head>
<body>
    <div align="center">
        <h3>BMI Calculator</h3>
        <label for="weight">Weight (kg):</label><br>
        <input type="number" id="weight" placeholder="Enter your weight" step="0.1" required><br>
        
        <label for="height">Height (m):</label><br>
        <input type="number" id="height" placeholder="Enter your height" step="0.01" required><br>
        
        <button onclick="calculateBMI()">Calculate BMI</button>
    </div>

    <script>
        function calculateBMI() {
            const weight = parseFloat(document.getElementById('weight').value);
            const height = parseFloat(document.getElementById('height').value);

            if (isNaN(weight) || isNaN(height) || weight <= 0 || height <= 0) {
                alert("Please enter valid positive numbers for weight and height.");
                return;
            }

            const bmi = weight / (height * height);
            let message = `Your BMI is ${bmi.toFixed(2)}. You are `;
        
            if (bmi < 18.5) {
                message += "UNDERWEIGHT!";
            } else if (bmi < 24.9) {
                message += "NORMAL WEIGHT!";
            } else if (bmi < 29.9) {
                message += "OVERWEIGHT!";
            } else {
                message += "OBESE!";
            }
        
            alert(message);
        }
    </script>
</body>
</html>
